version: "3.9"

services:
  postgres:
    image: postgres:16-alpine3.23
    environment:
      POSTGRES_DB: devportal
      POSTGRES_USER: devportal
      POSTGRES_PASSWORD: devportal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devportal -d devportal"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://devportal:devportal@postgres:5432/devportal"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Mount source for live reload during development
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  postgres-data:
