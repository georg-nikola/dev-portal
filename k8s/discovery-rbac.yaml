---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-portal-api
  namespace: dev-portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dev-portal-discovery
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dev-portal-discovery
subjects:
  - kind: ServiceAccount
    name: dev-portal-api
    namespace: dev-portal
roleRef:
  kind: ClusterRole
  name: dev-portal-discovery
  apiGroup: rbac.authorization.k8s.io
