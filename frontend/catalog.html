<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Portal</title>
  <link rel="stylesheet" href="style.css?v=1.1.0" />
</head>
<body>

  <!-- ======= TOP NAV ======= -->
  <header class="topnav">
    <div class="topnav-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="28" height="28" rx="6" fill="#6366f1"/>
        <path d="M7 14l5 5 9-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">Dev Portal</span>
    </div>
    <nav class="topnav-links">
      <a href="/catalog" class="nav-link active">Services</a>
      <a href="/clusters" class="nav-link">Clusters</a>
    </nav>
    <div class="topnav-actions">
      <span class="refresh-indicator" id="refreshIndicator" title="Auto-refresh every 30s"></span>
      <button class="btn btn-primary" id="addServiceBtn">+ Add Service</button>
      <div class="topnav-user">
        <span class="topnav-username" id="currentUser"></span>
        <button class="btn btn-ghost" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <!-- ======= MAIN LAYOUT ======= -->
  <main class="main-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-heading">Status</h3>
        <div class="filter-group" id="statusFilters">
          <button class="filter-chip active" data-filter-type="status" data-value="">All</button>
          <button class="filter-chip" data-filter-type="status" data-value="healthy">
            <span class="dot dot-healthy"></span> Healthy
          </button>
          <button class="filter-chip" data-filter-type="status" data-value="degraded">
            <span class="dot dot-degraded"></span> Degraded
          </button>
          <button class="filter-chip" data-filter-type="status" data-value="down">
            <span class="dot dot-down"></span> Down
          </button>
          <button class="filter-chip" data-filter-type="status" data-value="unknown">
            <span class="dot dot-unknown"></span> Unknown
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-heading">Teams</h3>
        <div class="filter-group" id="teamFilters">
          <button class="filter-chip active" data-filter-type="team" data-value="">All Teams</button>
          <!-- populated by JS -->
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-heading">Tags</h3>
        <div class="filter-group" id="tagFilters">
          <!-- populated by JS -->
        </div>
      </div>

      <div class="sidebar-stats" id="sidebarStats">
        <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value" id="statTotal">—</span></div>
        <div class="stat-row"><span class="stat-label">Healthy</span><span class="stat-value healthy-text" id="statHealthy">—</span></div>
        <div class="stat-row"><span class="stat-label">Degraded</span><span class="stat-value degraded-text" id="statDegraded">—</span></div>
        <div class="stat-row"><span class="stat-label">Down</span><span class="stat-value down-text" id="statDown">—</span></div>
      </div>
    </aside>

    <!-- CONTENT AREA -->
    <div class="content-area">
      <div class="content-header">
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="#9ca3af" stroke-width="1.5"/>
            <path d="M10.5 10.5l3 3" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search services, teams, descriptions…" />
        </div>
        <div class="view-meta" id="viewMeta">Loading…</div>
      </div>

      <!-- CARDS GRID -->
      <div class="cards-grid" id="cardsGrid">
        <!-- skeleton while loading -->
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
      </div>

      <!-- EMPTY STATE -->
      <div class="empty-state hidden" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#1e293b"/>
          <path d="M16 32l8-16 8 16" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="20" r="2" fill="#475569"/>
        </svg>
        <h3>No services found</h3>
        <p id="emptyStateMsg">Try adjusting your search or filters.</p>
        <button class="btn btn-primary" id="emptyAddBtn">Add your first service</button>
      </div>
    </div>
  </main>

  <!-- ======= ADD / EDIT SERVICE MODAL ======= -->
  <div class="modal-overlay hidden" id="serviceModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Service</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <form class="modal-form" id="serviceForm" novalidate>
        <input type="hidden" id="formServiceId" />

        <div class="form-row">
          <div class="form-group">
            <label for="formName">Name <span class="required">*</span></label>
            <input type="text" id="formName" name="name" required placeholder="my-service" />
          </div>
          <div class="form-group">
            <label for="formTeam">Team</label>
            <input type="text" id="formTeam" name="team" placeholder="Platform" />
          </div>
        </div>

        <div class="form-group">
          <label for="formDescription">Description</label>
          <textarea id="formDescription" name="description" rows="2" placeholder="What does this service do?"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="formStatus">Status</label>
            <select id="formStatus" name="status">
              <option value="unknown">Unknown</option>
              <option value="healthy">Healthy</option>
              <option value="degraded">Degraded</option>
              <option value="down">Down</option>
            </select>
          </div>
          <div class="form-group">
            <label for="formTags">Tags <span class="hint">(comma-separated)</span></label>
            <input type="text" id="formTags" name="tags" placeholder="api, critical, python" />
          </div>
        </div>

        <div class="form-group">
          <label for="formStatusUrl">Health Check URL</label>
          <input type="url" id="formStatusUrl" name="status_url" placeholder="https://my-service/health" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="formDocsUrl">Docs URL</label>
            <input type="url" id="formDocsUrl" name="docs_url" placeholder="https://docs.example.com/my-service" />
          </div>
          <div class="form-group">
            <label for="formGithubUrl">GitHub URL</label>
            <input type="url" id="formGithubUrl" name="github_url" placeholder="https://github.com/org/my-service" />
          </div>
        </div>

        <div class="form-group">
          <label for="formDashboardUrl">Dashboard URL</label>
          <input type="url" id="formDashboardUrl" name="dashboard_url" placeholder="https://grafana.example.com/d/..." />
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button type="button" class="btn btn-danger hidden" id="deleteServiceBtn">Delete</button>
          <button type="submit" class="btn btn-primary" id="saveServiceBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ======= CONFIRM MODAL ======= -->
  <div class="modal-overlay hidden" id="confirmModal" role="dialog" aria-modal="true">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">Confirm Delete</h2>
        <button class="modal-close" id="confirmClose">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMsg">Are you sure you want to delete this service?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <!-- ======= TOAST ======= -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="auth.js?v=1.1.0"></script>
  <script src="app.js?v=1.1.0"></script>
</body>
</html>
