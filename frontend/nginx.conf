worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        # Docker-compose local dev: proxy /api to the API container.
        # In production (k8s) Traefik routes /api requests directly to the API
        # service before they reach this container, so this block is never hit.
        resolver 127.0.0.11 valid=10s ipv6=off;
        location /api {
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # Cache static assets (versioned via ?v=)
        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Catalog app — serve catalog.html at /catalog and /catalog/
        location = /catalog {
            try_files /catalog.html =404;
        }
        location = /catalog/ {
            try_files /catalog.html =404;
        }

        # Login page
        location = /login {
            try_files /login.html =404;
        }
        location = /login/ {
            try_files /login.html =404;
        }

        # Landing page — SPA fallback for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
