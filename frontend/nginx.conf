server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-compose local dev: proxy /api to the API container.
    # In production (k8s) Traefik routes /api requests directly to the API
    # service before they reach this container, so this block is never hit.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /api {
        set $api_upstream http://api:8000;
        proxy_pass         $api_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Cache static assets (versioned via ?v=)
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
