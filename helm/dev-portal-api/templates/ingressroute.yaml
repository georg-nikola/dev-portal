apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dev-portal-auth-ratelimit
  namespace: dev-portal
spec:
  rateLimit:
    average: 10
    burst: 5
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dev-portal-api
  namespace: dev-portal
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/auth`)
      kind: Rule
      middlewares:
        - name: dev-portal-auth-ratelimit
      services:
        - name: {{ include "dev-portal-api.fullname" . }}
          port: {{ .Values.service.port }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: {{ include "dev-portal-api.fullname" . }}
          port: {{ .Values.service.port }}
