apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-portal-api.fullname" . }}
  namespace: dev-portal
  labels:
    app: {{ include "dev-portal-api.name" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "dev-portal-api.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
