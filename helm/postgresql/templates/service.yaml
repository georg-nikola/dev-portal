apiVersion: v1
kind: Service
metadata:
  name: postgresql-dev-portal
  namespace: dev-portal
  labels:
    app: postgresql-dev-portal
spec:
  type: ClusterIP
  selector:
    app: postgresql-dev-portal
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5432
      protocol: TCP
      name: postgres
