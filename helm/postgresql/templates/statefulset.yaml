apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-dev-portal
  namespace: dev-portal
  labels:
    app: postgresql-dev-portal
spec:
  serviceName: postgresql-dev-portal
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-dev-portal
  template:
    metadata:
      labels:
        app: postgresql-dev-portal
    spec:
      automountServiceAccountToken: false
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/var/lib/postgresql/certs/server.crt"
            - "-c"
            - "ssl_key_file=/var/lib/postgresql/certs/server.key"
            - "-c"
            - "ssl_ca_file=/var/lib/postgresql/certs/ca.crt"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: pg-tls
              mountPath: /var/lib/postgresql/certs
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "devportal", "-d", "devportal"]
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "devportal", "-d", "devportal"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: pg-tls
          secret:
            secretName: postgresql-tls
            defaultMode: 0600
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.storageClassName }}
        storageClassName: {{ .Values.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
