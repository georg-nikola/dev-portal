image:
  repository: postgres
  tag: "16-alpine3.23"
  pullPolicy: IfNotPresent

storage:
  size: 5Gi
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  port: 5432

tolerations: []

# Pod-level security context (e.g. fsGroup for PVC permissions).
podSecurityContext: {}

# Container-level security context. Set readOnlyRootFilesystem: true to
# satisfy the verify-image / KSV014 audit policy. When enabled, supply
# extraVolumes/extraVolumeMounts below for postgres' writable paths
# (/tmp, /var/run/postgresql).
containerSecurityContext: {}

# Additional volumes appended to the StatefulSet pod spec.
extraVolumes: []

# Additional volume mounts appended to the postgres container.
extraVolumeMounts: []
