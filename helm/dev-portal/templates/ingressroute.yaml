apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dev-portal-frontend
  namespace: dev-portal
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && !PathPrefix(`/api`)
      kind: Rule
      {{- if .Values.ingress.middlewares }}
      middlewares:
        {{- toYaml .Values.ingress.middlewares | nindent 8 }}
      {{- end }}
      services:
        - name: {{ include "dev-portal.fullname" . }}
          port: {{ .Values.service.port }}
    {{- if .Values.ingress.authentikOutpost }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
    {{- end }}
