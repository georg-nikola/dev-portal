apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dev-portal-frontend
  namespace: dev-portal
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && !PathPrefix(`/api`)
      kind: Rule
      services:
        - name: {{ include "dev-portal.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    certResolver: cloudflare
